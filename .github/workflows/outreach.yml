name: Daily Outreach

on:
  schedule:
    # Runs daily at 8 AM UTC (2 hours after scraping)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  outreach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download leads artifact
        uses: actions/download-artifact@v4
        with:
          name: leads
        continue-on-error: true

      - name: Run outreach
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL || 'hello@zelexstudio.in' }}
          FROM_NAME: ${{ secrets.FROM_NAME || 'Zelex Studio' }}
        run: python outreach.py

      - name: Commit outreach log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add outreach_log.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update outreach log $(date +%Y-%m-%d)"
          git push
        continue-on-error: true

      - name: Upload outreach log artifact
        uses: actions/upload-artifact@v4
        with:
          name: outreach-log
          path: outreach_log.csv
          retention-days: 30
