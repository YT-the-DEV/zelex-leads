name: Daily Lead Scraping

  on:
    schedule:
      - cron: '0 6 * * *'
    workflow_dispatch:

  jobs:
    scrape:
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run scraper
        env:
          NICHE: ${{ vars.NICHE }}
          TARGET_CITIES: ${{ vars.TARGET_CITIES }}
        run: python scraper.py
      - uses: actions/upload-artifact@v4
        with:
          name: leads
          path: |
            leads.csv
            leads_high_priority.csv
