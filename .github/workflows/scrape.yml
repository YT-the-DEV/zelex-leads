name: Daily Lead Scraping

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run scraper
      env:
        NICHE: ${{ vars.NICHE || 'restaurants,cafes,salons' }}
        TARGET_CITIES: ${{ vars.TARGET_CITIES || 'New York,London' }}
      run: python scraper.py

    - name: Upload leads artifact
      uses: actions/upload-artifact@v4
      with:
        name: leads-${{ github.run_id }}
        path: |
          leads.csv
          leads_high_priority.csv
        retention-days: 30
