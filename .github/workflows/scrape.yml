name: Daily Lead Scraping

on:
  schedule:
    # Runs daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          NICHE: ${{ vars.NICHE || 'restaurants,cafes,salons,dentists' }}
          TARGET_CITIES: ${{ vars.TARGET_CITIES || 'New York,London,Los Angeles' }}
        run: python scraper.py

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add leads.csv leads_high_priority.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update leads $(date +%Y-%m-%d)"
          git push
        continue-on-error: true

      - name: Upload leads artifact
        uses: actions/upload-artifact@v4
        with:
          name: leads
          path: |
            leads.csv
            leads_high_priority.csv
          retention-days: 30
